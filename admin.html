<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぐるっとポン 管理画面</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --col-yellow: #fef100;
      --col-blue: #005dab;
      --col-pink: #d90060;
      --col-green: #8cb808;
      --text: #333;
      --text-sub: #666;
      --bg: #f0f0f0;
      --card: #fff;
      --border: #ddd;
      --error: #d32f2f;
      --success: #388e3c;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    html { font-size: 15px; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, 'MS PGothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== Login ===== */
    #screen-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #222;
    }
    .login-box {
      background: var(--card);
      border-radius: 12px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-box .logo {
      font-size: 22px;
      font-weight: bold;
      color: #222;
      background: var(--col-yellow);
      display: inline-block;
      padding: 6px 18px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .login-box h2 { font-size: 16px; color: var(--text-sub); margin-bottom: 28px; }
    .login-box input[type="password"] {
      width: 100%;
      font-size: 16px;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      outline: none;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 14px;
    }
    .login-box input:focus { border-color: var(--col-yellow); }
    .btn-login {
      width: 100%;
      min-height: 48px;
      font-size: 16px;
      font-weight: bold;
      background: var(--col-yellow);
      color: #222;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #f0d800; }
    .login-error {
      color: var(--error);
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    .login-error.show { display: block; }

    /* ===== Admin Panel ===== */
    #screen-admin { display: none; min-height: 100vh; }
    .admin-header {
      background: #222;
      color: #fff;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header .title {
      font-size: 16px;
      font-weight: bold;
    }
    .admin-header .title span {
      background: var(--col-yellow);
      color: #222;
      padding: 2px 10px;
      border-radius: 4px;
      margin-right: 8px;
    }
    .btn-logout {
      font-size: 13px;
      padding: 6px 16px;
      background: #444;
      color: #eee;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: #666; }

    /* Tabs */
    .tabs {
      background: #fff;
      border-bottom: 2px solid var(--border);
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex: 1;
      min-width: 100px;
      padding: 13px 10px;
      font-size: 15px;
      font-weight: bold;
      color: var(--text-sub);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active { color: #222; border-bottom-color: var(--col-yellow); }
    .tab-btn:hover { background: #f9f9f9; }

    /* Tab Content */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ===== Common ===== */
    .section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin: 16px;
      box-shadow: var(--shadow);
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--col-yellow);
      color: #222;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, background 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-brand { background: var(--col-yellow); color: #222; }
    .btn-danger { background: #f44336; color: #fff; }
    .btn-gray   { background: #888; color: #fff; }
    .btn-outline {
      background: #fff;
      color: #555;
      border: 1px solid #ccc;
    }

    /* Topic Editor */
    .topic-editor textarea {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    .topic-editor textarea:focus { border-color: var(--col-yellow); }
    .topic-editor .editor-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    .save-msg {
      font-size: 13px;
      color: var(--success);
      display: none;
    }
    .save-msg.show { display: inline; }

    /* Post thread */
    .post-thread { margin-bottom: 12px; }
    .post-item {
      background: #fafafa;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .post-item.is-user { }
    .post-item.is-admin {
      background: #e8f3ff;
      border-color: var(--col-blue);
    }
    .post-header {
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px 8px;
    }
    .post-info { flex: 1; min-width: 0; }
    .post-nick {
      font-weight: bold;
      font-size: 14px;
      color: #222;
    }
    .post-nick .admin-tag {
      background: var(--col-blue);
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 5px;
    }
    .post-email { font-size: 12px; color: var(--text-sub); word-break: break-all; }
    .post-meta { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .post-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .post-body {
      padding: 0 14px 10px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* Visibility Toggle */
    .toggle-vis {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .toggle-vis.shown { background: #e8f5e9; color: #2e7d32; }
    .toggle-vis.hidden { background: #fbe9e7; color: #bf360c; }

    /* Inline edit form for admin posts */
    .admin-edit-form {
      display: none;
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      background: #fffde7;
    }
    .admin-edit-form.open { display: block; }
    .admin-edit-form textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 6px;
      resize: none;
      min-height: 70px;
      outline: none;
    }
    .admin-edit-form textarea:focus { border-color: var(--col-yellow); }
    .admin-edit-form-footer {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: flex-end;
    }

    /* Reply form */
    .reply-form {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      background: #fffde7;
    }
    .reply-form.open { display: block; }
    .reply-form textarea {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 6px;
      resize: none;
      min-height: 80px;
      outline: none;
    }
    .reply-form textarea:focus { border-color: var(--col-yellow); }
    .reply-form-footer {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: flex-end;
    }

    /* Reply thread */
    .reply-thread {
      margin-top: 8px;
      margin-left: 16px;
      padding-left: 14px;
      border-left: 3px solid var(--col-blue);
    }
    .post-item.reply { margin-top: 0; }

    /* ===== Tab 2: Data ===== */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 560px;
    }
    thead th {
      background: #333;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-weight: bold;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: #f5f5f5; }
    tbody td { padding: 9px 12px; word-break: break-all; }

    .ranking-list { list-style: none; }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .rank-num {
      font-size: 20px;
      font-weight: bold;
      color: #bbb;
      min-width: 32px;
      text-align: center;
    }
    .rank-num.top3 { color: #ff9800; }
    .rank-content { flex: 1; min-width: 0; }
    .rank-nick { font-weight: bold; font-size: 13px; }
    .rank-text { font-size: 13px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-count {
      font-size: 16px;
      font-weight: bold;
      color: #f57c00;
      white-space: nowrap;
    }

    /* ===== Tab 3: Stats ===== */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 0;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px;
      box-shadow: var(--shadow);
      text-align: center;
      border-top: 4px solid var(--col-yellow);
    }
    .stat-label { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: bold; color: #222; }

    .chart-wrap {
      position: relative;
      max-width: 100%;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty { text-align: center; padding: 30px; color: var(--text-sub); font-size: 14px; }

    @media (max-width: 600px) {
      .stat-cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 14px 10px; }
      .stat-value { font-size: 24px; }
      .section { padding: 14px 12px; margin: 10px; }
    }
    @media (max-width: 400px) {
      .stat-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     ログイン画面
     ============================================================ -->
<div id="screen-login">
  <div class="login-box">
    <div class="logo">ぐるっとポン</div>
    <h2>管理画面ログイン</h2>
    <input type="password" id="inp-pw" placeholder="パスワードを入力" autocomplete="current-password">
    <button id="btn-login" class="btn-login">ログイン</button>
    <div class="login-error" id="login-err">パスワードが正しくありません。</div>
  </div>
</div>

<!-- ============================================================
     管理パネル
     ============================================================ -->
<div id="screen-admin">
  <div class="admin-header">
    <div class="title"><span>管理</span>ぐるっとポン 管理画面</div>
    <button id="btn-logout" class="btn-logout">ログアウト</button>
  </div>

  <!-- タブナビ -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="posts">📝 投稿管理</button>
    <button class="tab-btn" data-tab="data">📊 データ抽出</button>
    <button class="tab-btn" data-tab="stats">📈 統計</button>
  </div>

  <!-- ============================================================
       タブ1：投稿管理
       ============================================================ -->
  <div id="tab-posts" class="tab-pane active">

    <!-- お題・コラム編集 -->
    <div class="section">
      <div class="section-title">お題・コラム編集</div>
      <div class="topic-editor">
        <label style="display:block;font-size:13px;font-weight:bold;color:#555;margin-bottom:4px">ラベル（見出し）</label>
        <input type="text" id="topic-label-input" placeholder="例：今日のお題・コラム、運営からのお知らせ 等"
          style="width:100%;font-size:14px;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius);font-family:inherit;outline:none;margin-bottom:12px;">
        <label style="display:block;font-size:13px;font-weight:bold;color:#555;margin-bottom:4px">本文</label>
        <textarea id="topic-textarea" placeholder="お題・コラムのテキストを入力してください..."></textarea>
        <div class="editor-footer">
          <button id="btn-save-topic" class="btn btn-brand">保存する</button>
          <span id="topic-save-msg" class="save-msg">✓ 保存しました</span>
        </div>
      </div>
    </div>

    <!-- 投稿一覧 -->
    <div class="section">
      <div class="section-title">投稿一覧</div>
      <div id="admin-posts-list" class="admin-post-list">
        <div class="empty">読み込み中...</div>
      </div>
    </div>

  </div><!-- /tab-posts -->

  <!-- ============================================================
       タブ2：データ抽出
       ============================================================ -->
  <div id="tab-data" class="tab-pane">

    <!-- ユーザー一覧 -->
    <div class="section">
      <div class="section-title">参加ユーザー一覧</div>
      <div style="margin-bottom:12px">
        <button id="btn-csv" class="btn btn-brand">📥 CSVダウンロード</button>
      </div>
      <div class="table-wrap">
        <table id="user-table">
          <thead>
            <tr>
              <th>ニックネーム</th>
              <th>メールアドレス</th>
              <th>投稿数</th>
              <th>獲得リアクション</th>
              <th>登録日時</th>
            </tr>
          </thead>
          <tbody id="user-table-body">
            <tr><td colspan="5" class="empty">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- リアクションランキング -->
    <div class="section">
      <div class="section-title">リアクション数ランキング TOP10</div>
      <ol id="reaction-ranking" class="ranking-list">
        <div class="empty">読み込み中...</div>
      </ol>
    </div>

  </div><!-- /tab-data -->

  <!-- ============================================================
       タブ3：統計
       ============================================================ -->
  <div id="tab-stats" class="tab-pane">

    <!-- サマリーカード -->
    <div class="section">
      <div class="section-title">概要</div>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">ユーザー投稿数</div>
          <div class="stat-value" id="stat-user-posts">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">運営コメント数</div>
          <div class="stat-value" id="stat-admin-posts">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">ユーザーのリアクション</div>
          <div class="stat-value" id="stat-user-rxn">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">運営のリアクション</div>
          <div class="stat-value" id="stat-admin-rxn">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">総ユーザー数</div>
          <div class="stat-value" id="stat-users">-</div>
        </div>
      </div>
    </div>

    <!-- リアクション種別グラフ -->
    <div class="section">
      <div class="section-title">リアクション種別（ユーザーのみ）</div>
      <div class="chart-wrap">
        <canvas id="chart-reactions" height="160"></canvas>
      </div>
    </div>

    <!-- 日別投稿数グラフ -->
    <div class="section">
      <div class="section-title">日別投稿数（直近30日）</div>
      <div class="chart-wrap">
        <canvas id="chart-daily" height="200"></canvas>
      </div>
    </div>

  </div><!-- /tab-stats -->

</div><!-- /screen-admin -->

<script>
  /* ==============================================================
     Firebase 設定
  ============================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyCjifw0gm1xq0nptWF-8cjaaboTpRS1x1M",
    authDomain: "gurutto-pon-test1.firebaseapp.com",
    databaseURL: "https://gurutto-pon-test1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gurutto-pon-test1",
    storageBucket: "gurutto-pon-test1.appspot.com",
    messagingSenderId: "532098272164",
    appId: "1:532098272164:web:68d0aa9be4590ae8b04f31"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const BASE = 'comments';
  const ADMIN_PW = 'grt2026';

  /* ==============================================================
     ユーティリティ
  ============================================================== */
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} `
         + `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function totalReactions(reactions) {
    if (!reactions) return 0;
    let n = 0;
    Object.values(reactions).forEach(r => {
      if (r.thumb === true) n++;
      if (r.heart === true) n++;
      if (r.idea === true) n++;
    });
    return n;
  }

  function countReactionsByType(reactions) {
    const c = { thumb: 0, heart: 0, idea: 0 };
    if (!reactions) return c;
    Object.values(reactions).forEach(r => {
      if (r.thumb === true) c.thumb++;
      if (r.heart === true) c.heart++;
      if (r.idea === true) c.idea++;
    });
    return c;
  }

  function escCsv(v) {
    const s = String(v ?? '');
    if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  /* ==============================================================
     ログイン
  ============================================================== */
  function checkAuth() {
    return localStorage.getItem('gp_admin_auth') === 'yes';
  }

  if (checkAuth()) {
    enterAdmin();
  }

  document.getElementById('inp-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });

  document.getElementById('btn-login').addEventListener('click', () => {
    const pw = document.getElementById('inp-pw').value;
    if (pw === ADMIN_PW) {
      localStorage.setItem('gp_admin_auth', 'yes');
      document.getElementById('login-err').classList.remove('show');
      enterAdmin();
    } else {
      document.getElementById('login-err').classList.add('show');
      document.getElementById('inp-pw').value = '';
      document.getElementById('inp-pw').focus();
    }
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('gp_admin_auth');
    location.reload();
  });

  /* ==============================================================
     管理パネル起動
  ============================================================== */
  let allPostsData = null;
  let allUsersData = null;
  let reactionChart = null;
  let dailyChart = null;

  function enterAdmin() {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-admin').style.display = 'block';
    startAdminListeners();
  }

  function startAdminListeners() {
    // お題テキスト・ラベルの読み込み
    db.ref(`${BASE}/topic`).on('value', snap => {
      const data = snap.val();
      if (data) {
        if (data.text  !== undefined) document.getElementById('topic-textarea').value   = data.text;
        if (data.label !== undefined) document.getElementById('topic-label-input').value = data.label;
      }
    });

    // 投稿一覧のリスナー
    db.ref(`${BASE}/posts`).orderByChild('createdAt').on('value', snap => {
      allPostsData = snap.val();
      renderAdminPosts(allPostsData);
      if (allUsersData !== null) {
        renderUserTable(allUsersData, allPostsData);
        renderRanking(allPostsData);
      }
      if (document.getElementById('tab-stats').classList.contains('active')) {
        renderStats(allUsersData, allPostsData);
      }
    });

    // ユーザー一覧のリスナー
    db.ref(`${BASE}/users`).on('value', snap => {
      allUsersData = snap.val();
      if (allPostsData !== null) {
        renderUserTable(allUsersData, allPostsData);
        renderRanking(allPostsData);
      }
      if (document.getElementById('tab-stats').classList.contains('active')) {
        renderStats(allUsersData, allPostsData);
      }
    });
  }

  /* ==============================================================
     タブ切替
  ============================================================== */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');

      if (tab === 'stats') {
        renderStats(allUsersData, allPostsData);
      }
    });
  });

  /* ==============================================================
     タブ1：お題保存
  ============================================================== */
  document.getElementById('btn-save-topic').addEventListener('click', async () => {
    const text  = document.getElementById('topic-textarea').value.trim();
    const label = document.getElementById('topic-label-input').value.trim();
    const btn   = document.getElementById('btn-save-topic');
    btn.disabled = true;
    try {
      await db.ref(`${BASE}/topic`).set({
        text:      text,
        label:     label || '今日のお題・コラム',
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
      const msg = document.getElementById('topic-save-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2500);
    } catch (e) {
      console.error(e);
      alert('保存に失敗しました。もう一度お試しください。');
    } finally {
      btn.disabled = false;
    }
  });

  /* ==============================================================
     タブ1：投稿一覧レンダリング（ツリー形式）
  ============================================================== */
  function renderAdminPosts(data) {
    const container = document.getElementById('admin-posts-list');
    if (!data) {
      container.innerHTML = '<div class="empty">投稿はまだありません。</div>';
      return;
    }

    // 投稿を振り分け（親投稿と返信）
    const posts = {};
    const threadMap = {};
    const roots = [];

    Object.entries(data).forEach(([id, p]) => {
      posts[id] = { ...p, id };
      if (p.replyTo) {
        if (!threadMap[p.replyTo]) threadMap[p.replyTo] = [];
        threadMap[p.replyTo].push({ ...p, id });
      } else {
        roots.push({ ...p, id });
      }
    });

    // 新しい順ソート
    roots.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    Object.values(threadMap).forEach(arr => {
      arr.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    });

    container.innerHTML = roots.map(p => {
      const thread = renderPostWithReplies(p, threadMap[p.id] || []);
      return `<div class="post-thread">${thread}</div>`;
    }).join('');
  }

  function renderPostWithReplies(p, replies) {
    const isVisible = p.isVisible !== false;
    const isAdmin = p.isAdmin === true;
    const total = totalReactions(p.reactions);
    const cnt = countReactionsByType(p.reactions);
    const email = allUsersData && p.userId ? (allUsersData[p.userId] ? allUsersData[p.userId].email : '') : '';

    let html = `
      <div class="post-item${isAdmin ? ' is-admin' : ' is-user'}${!isVisible ? ' is-hidden' : ''}" id="apost-${esc(p.id)}" data-id="${esc(p.id)}">
        <div class="post-header">
          <div class="post-info">
            <div class="post-nick">
              ${isAdmin ? '<span class="admin-tag">運営</span>' : ''}
              ${esc(p.nickname)}
            </div>
            ${!isAdmin ? `<div class="post-email">${esc(email)}</div>` : ''}
            <div class="post-meta">
              ${formatDate(p.createdAt)} ／
              リアクション：👍${cnt.thumb} ❤️${cnt.heart} 💡${cnt.idea}（計${total}件）
              ${!isVisible ? ' ／ <span style="color:#e53935;font-weight:bold;">非表示中</span>' : ''}
            </div>
          </div>
          <div class="post-actions">
            <button class="toggle-vis ${isVisible ? 'shown' : 'hidden'}"
              onclick="toggleVisibility('${esc(p.id)}', ${isVisible})">
              ${isVisible ? '✓ 表示中' : '✗ 非表示'}
            </button>
            ${isAdmin ? `
            <button class="btn btn-outline" onclick="toggleAdminEdit('${esc(p.id)}')">✏️ 編集</button>
            <button class="btn btn-danger" onclick="adminDeletePost('${esc(p.id)}')">🗑️ 削除</button>
            ` : `
            <button class="btn btn-outline" onclick="toggleReplyForm('${esc(p.id)}')">
              💬 運営コメント
            </button>`}
          </div>
        </div>
        <div class="post-body" id="body-${esc(p.id)}">${esc(p.content)}</div>
        ${isAdmin ? `
        <div class="admin-edit-form" id="aedit-${esc(p.id)}">
          <textarea maxlength="140">${esc(p.content)}</textarea>
          <div class="admin-edit-form-footer">
            <button class="btn btn-outline" onclick="closeAdminEdit('${esc(p.id)}')">キャンセル</button>
            <button class="btn btn-brand" onclick="saveAdminEdit('${esc(p.id)}')">保存</button>
          </div>
        </div>` : `
        <div class="reply-form" id="rform-${esc(p.id)}">
          <textarea placeholder="「運営」名義でコメントを入力..."></textarea>
          <div class="reply-form-footer">
            <button class="btn btn-outline" onclick="closeReplyForm('${esc(p.id)}')">キャンセル</button>
            <button class="btn btn-brand" onclick="submitReply('${esc(p.id)}')">投稿する</button>
          </div>
        </div>`}
      </div>`;

    if (replies.length > 0) {
      html += `<div class="reply-thread">
        ${replies.map(r => renderPostWithReplies(r, [])).join('')}
      </div>`;
    }

    return html;
  }

  function toggleVisibility(postId, currentlyVisible) {
    (async () => {
      try {
        await db.ref(`${BASE}/posts/${postId}/isVisible`).set(!currentlyVisible);
      } catch (e) {
        console.error(e);
        alert('更新に失敗しました。');
      }
    })();
  }

  function toggleReplyForm(postId) {
    const form = document.getElementById(`rform-${postId}`);
    if (form) form.classList.toggle('open');
  }

  function closeReplyForm(postId) {
    const form = document.getElementById(`rform-${postId}`);
    if (form) {
      form.classList.remove('open');
      form.querySelector('textarea').value = '';
    }
  }

  function submitReply(postId) {
    (async () => {
      const form = document.getElementById(`rform-${postId}`);
      const ta = form.querySelector('textarea');
      const content = ta.value.trim();
      if (!content) { alert('返信内容を入力してください。'); return; }

      const submitBtn = form.querySelector('.btn-brand');
      submitBtn.disabled = true;

      try {
        await db.ref(`${BASE}/posts`).push({
          userId: 'admin',
          nickname: '運営',
          content: content,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          isVisible: true,
          isAdmin: true,
          replyTo: postId
        });
        closeReplyForm(postId);
      } catch (e) {
        console.error(e);
        alert('投稿に失敗しました。');
      } finally {
        submitBtn.disabled = false;
      }
    })();
  }

  // 運営コメント インライン編集
  function toggleAdminEdit(postId) {
    const form = document.getElementById(`aedit-${postId}`);
    if (!form) return;
    form.classList.toggle('open');
    if (form.classList.contains('open')) form.querySelector('textarea').focus();
  }

  function closeAdminEdit(postId) {
    const form = document.getElementById(`aedit-${postId}`);
    if (form) form.classList.remove('open');
  }

  function saveAdminEdit(postId) {
    (async () => {
      const form = document.getElementById(`aedit-${postId}`);
      if (!form) return;
      const content = form.querySelector('textarea').value.trim();
      if (!content) { alert('内容を入力してください。'); return; }
      const saveBtn = form.querySelector('.btn-brand');
      saveBtn.disabled = true;
      try {
        await db.ref(`${BASE}/posts/${postId}/content`).set(content);
        // bodyテキストも即時更新
        const bodyEl = document.getElementById(`body-${postId}`);
        if (bodyEl) bodyEl.textContent = content;
        closeAdminEdit(postId);
      } catch (e) {
        console.error(e);
        alert('更新に失敗しました。');
      } finally {
        saveBtn.disabled = false;
      }
    })();
  }

  function adminDeletePost(postId) {
    if (!confirm('この運営コメントを削除してもよろしいですか？')) return;
    (async () => {
      try {
        await db.ref(`${BASE}/posts/${postId}`).remove();
      } catch (e) {
        console.error(e);
        alert('削除に失敗しました。');
      }
    })();
  }

  window.toggleVisibility  = toggleVisibility;
  window.toggleReplyForm   = toggleReplyForm;
  window.closeReplyForm    = closeReplyForm;
  window.submitReply       = submitReply;
  window.toggleAdminEdit   = toggleAdminEdit;
  window.closeAdminEdit    = closeAdminEdit;
  window.saveAdminEdit     = saveAdminEdit;
  window.adminDeletePost   = adminDeletePost;

  /* ==============================================================
     タブ2：ユーザーテーブル
  ============================================================== */
  function buildUserStats(users, posts) {
    const stats = {};

    if (users) {
      Object.entries(users).forEach(([hash, u]) => {
        stats[hash] = {
          nickname: u.nickname || '',
          email: u.email || '',
          createdAt: u.createdAt || 0,
          postCount: 0,
          receivedReactions: 0
        };
      });
    }

    if (posts) {
      Object.values(posts).forEach(p => {
        if (!p.userId || !stats[p.userId]) return;
        if (!p.isAdmin) {
          stats[p.userId].postCount++;
        }
        stats[p.userId].receivedReactions += totalReactions(p.reactions);
      });
    }

    return Object.values(stats).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  }

  function renderUserTable(users, posts) {
    const tbody = document.getElementById('user-table-body');
    const list = buildUserStats(users, posts);

    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">ユーザーはまだいません。</td></tr>';
      return;
    }

    tbody.innerHTML = list.map(u => `
      <tr>
        <td>${esc(u.nickname)}</td>
        <td>${esc(u.email)}</td>
        <td style="text-align:center">${u.postCount}</td>
        <td style="text-align:center">${u.receivedReactions}</td>
        <td>${formatDate(u.createdAt)}</td>
      </tr>`).join('');
  }

  document.getElementById('btn-csv').addEventListener('click', () => {
    const list = buildUserStats(allUsersData, allPostsData);
    if (list.length === 0) { alert('ダウンロードするデータがありません。'); return; }

    const headers = ['ニックネーム','メールアドレス','投稿数','獲得リアクション数','登録日時'];
    const rows = list.map(u => [
      u.nickname, u.email, u.postCount, u.receivedReactions, formatDate(u.createdAt)
    ]);

    const csvContent = [headers, ...rows]
      .map(row => row.map(v => escCsv(v)).join(','))
      .join('\r\n');

    const bom = '\uFEFF';
    const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `gurutto-pon-users-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  /* ==============================================================
     タブ2：リアクションランキング
  ============================================================== */
  function renderRanking(posts) {
    const container = document.getElementById('reaction-ranking');
    if (!posts) {
      container.innerHTML = '<div class="empty">データがありません。</div>';
      return;
    }

    const ranked = Object.entries(posts)
      .filter(([, p]) => !p.isAdmin)
      .map(([id, p]) => ({
        id,
        nickname: p.nickname || '名無し',
        content: p.content || '',
        total: totalReactions(p.reactions)
      }))
      .filter(p => p.total > 0)
      .sort((a, b) => b.total - a.total)
      .slice(0, 10);

    if (ranked.length === 0) {
      container.innerHTML = '<div class="empty">リアクションがついた投稿はまだありません。</div>';
      return;
    }

    container.innerHTML = ranked.map((p, i) => `
      <li class="ranking-item">
        <span class="rank-num${i < 3 ? ' top3' : ''}">${i + 1}</span>
        <div class="rank-content">
          <div class="rank-nick">${esc(p.nickname)}</div>
          <div class="rank-text">${esc(p.content)}</div>
        </div>
        <span class="rank-count">🎉 ${p.total}</span>
      </li>`).join('');
  }

  /* ==============================================================
     タブ3：統計
  ============================================================== */
  function renderStats(users, posts) {
    let userPosts = 0, adminPosts = 0;
    let userRxn = 0, adminRxn = 0;
    const reactionCounts = { thumb: 0, heart: 0, idea: 0 };
    const totalUsers = users ? Object.keys(users).length : 0;

    if (posts) {
      Object.values(posts).forEach(p => {
        if (p.isAdmin === true) {
          adminPosts++;
        } else {
          userPosts++;
        }

        if (p.reactions) {
          Object.entries(p.reactions).forEach(([userHash, r]) => {
            const count = (r.thumb === true ? 1 : 0) + (r.heart === true ? 1 : 0) + (r.idea === true ? 1 : 0);
            if (userHash === 'admin') {
              adminRxn += count;
            } else {
              userRxn += count;
            }
            if (userHash !== 'admin') {
              if (r.thumb === true) reactionCounts.thumb++;
              if (r.heart === true) reactionCounts.heart++;
              if (r.idea === true) reactionCounts.idea++;
            }
          });
        }
      });
    }

    document.getElementById('stat-user-posts').textContent = userPosts;
    document.getElementById('stat-admin-posts').textContent = adminPosts;
    document.getElementById('stat-user-rxn').textContent = userRxn;
    document.getElementById('stat-admin-rxn').textContent = adminRxn;
    document.getElementById('stat-users').textContent = totalUsers;

    renderReactionChart(reactionCounts);
    renderDailyChart(posts);
  }

  function renderReactionChart(counts) {
    const ctx = document.getElementById('chart-reactions').getContext('2d');
    if (reactionChart) { reactionChart.destroy(); reactionChart = null; }

    reactionChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['👍 いいね', '❤️ ハート', '💡 アイデア'],
        datasets: [{
          label: 'リアクション数',
          data: [counts.thumb, counts.heart, counts.idea],
          backgroundColor: ['#fef100', '#ef9a9a', '#ffe082'],
          borderColor: ['#f0d800', '#e57373', '#ffd54f'],
          borderWidth: 2,
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1, precision: 0 }
          }
        }
      }
    });
  }

  function renderDailyChart(posts) {
    const daily = {};
    if (posts) {
      Object.values(posts).forEach(p => {
        if (!p.createdAt || p.isAdmin) return;
        const d = new Date(p.createdAt);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        daily[key] = (daily[key] || 0) + 1;
      });
    }

    const labels = [], data = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      labels.push(`${d.getMonth()+1}/${d.getDate()}`);
      data.push(daily[key] || 0);
    }

    const ctx = document.getElementById('chart-daily').getContext('2d');
    if (dailyChart) { dailyChart.destroy(); dailyChart = null; }

    dailyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '投稿数',
          data,
          borderColor: '#fef100',
          backgroundColor: 'rgba(254,241,0,0.12)',
          fill: true,
          tension: 0.35,
          pointRadius: 3,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1, precision: 0 }
          },
          x: {
            ticks: {
              maxTicksLimit: 10,
              maxRotation: 0
            }
          }
        }
      }
    });
  }
</script>
</body>
</html>
